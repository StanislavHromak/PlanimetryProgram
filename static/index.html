<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Універсальний Планіметричний Рушій</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>📐 Планіметрія: Експертна Система</h1>

        <div class="settings-panel">
            <div class="setting-group">
                <label for="figure-select">Оберіть фігуру:</label>
                <select id="figure-select" onchange="updateUI()"></select>
            </div>

            <div class="setting-group">
                <label for="task-select">Що відомо?</label>
                <select id="task-select" onchange="updateInputs()"></select>
            </div>

            <div class="setting-group">
                <label>Що знайти?</label>
                <div id="target-checkboxes" class="checkbox-group">
                    <label><input type="checkbox" value="area" checked> Площу (S)</label>
                    <label><input type="checkbox" value="perimeter"> Периметр (P)</label>
                    <label><input type="checkbox" value="incircle"> Вписане коло (r)</label>
                    <label><input type="checkbox" value="circumcircle"> Описане коло (R)</label>
                    <label><input type="checkbox" value="side" checked> Невідомі сторони/кути</label>
                </div>
            </div>
        </div>

        <div id="dynamic-inputs" class="input-section"></div>

        <button onclick="solve()">Розрахувати задачу</button>
        <div id="error-msg" class="error"></div>

        <div id="results" class="results" style="display: none;">
            <div class="flex-res">
                <div class="data-res">
                    <h3>✅ Знайдені параметри:</h3>
                    <ul id="params-list"></ul>
                </div>

                <div class="img-res" id="plot-section" style="display: none;">
                    <h3>🎨 Креслення:</h3>
                    <div id="plot-container"></div>
                </div>
            </div>

            <div class="steps-res">
                <h3>🧠 Хід розв'язання (База знань):</h3>
                <div id="steps-list"></div>
            </div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
